
{% extends 'main/base.html' %}

{% block sarlavha %}
Shartlar
{% endblock %}

{% block kontent %}
<h1>Kitoblar holati</h1>

{% for kitob in kitoblar %}
    {% if kitob.mavjud %}
        <p style="color: green">
            {{ kitob.nom }}
        </p>
    {% else %}
        <p style="color: red">
            {{ kitob.nom }} — Mavjud emas
        </p>
    {% endif %}
{% endfor %}
{% endblock %}
